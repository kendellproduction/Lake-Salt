<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lake Salt — Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Lake <span>Salt</span></div>
    <p class="auth-sub">Admin Dashboard</p>
    <button id="google-signin-btn" class="auth-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px;vertical-align:middle"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <div id="auth-error" class="auth-error" style="display:none"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     ADMIN APP SHELL
═══════════════════════════════════════════ -->
<div id="admin-app" style="display:none">

  <!-- Mobile header -->
  <header class="mobile-header">
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-logo">Lake <span>Salt</span></div>
    <img id="user-avatar-mobile" src="" alt="" class="user-avatar-sm" />
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ─── SIDEBAR ─── -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Lake <span>Salt</span></div>
      <button id="sidebar-close" class="sidebar-close" aria-label="Close">✕</button>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" data-module="dashboard" href="#dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-module="crm" href="#crm">
        <span class="nav-icon">🎯</span><span class="nav-label">CRM &amp; Leads</span>
        <span class="nav-badge" id="badge-crm" style="display:none"></span>
      </a>
      <a class="nav-item" data-module="projects" href="#projects">
        <span class="nav-icon">📋</span><span class="nav-label">Projects</span>
      </a>
      <a class="nav-item" data-module="bartenders" href="#bartenders">
        <span class="nav-icon">🍸</span><span class="nav-label">Bartenders</span>
      </a>
      <a class="nav-item" data-module="analytics" href="#analytics">
        <span class="nav-icon">💰</span><span class="nav-label">Analytics</span>
      </a>
      <a class="nav-item" data-module="expenses" href="#expenses">
        <span class="nav-icon">🧾</span><span class="nav-label">Expenses</span>
      </a>
      <a class="nav-item" data-module="inventory" href="#inventory">
        <span class="nav-icon">📦</span><span class="nav-label">Inventory</span>
        <span class="nav-badge danger" id="badge-inventory" style="display:none"></span>
      </a>
      <a class="nav-item" data-module="funnel" href="#funnel">
        <span class="nav-icon">📈</span><span class="nav-label">Funnel</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <img id="user-avatar" src="" alt="" class="user-avatar" />
      <div class="sidebar-user-info">
        <span id="user-name" class="user-name"></span>
        <span id="user-role" class="user-role"></span>
      </div>
      <button id="signout-btn" class="signout-btn" title="Sign out">↪</button>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ─── -->
  <main id="main-content" class="main-content">
    <div id="module-container" class="module-container">
      <!-- Modules render here -->
    </div>
  </main>
</div>

<!-- ─── MODAL LAYER ─── -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div id="modal-box" class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" class="modal-close">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- ─── TOAST CONTAINER ─── -->
<div id="toast-container" class="toast-container"></div>

<!-- ─── FIREBASE CONFIG (gitignored — never committed) ─── -->
<script src="../firebase-config.js"></script>

<!-- ─── FIREBASE COMPAT SDK ─── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- ─── CHART.JS ─── -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- ─── ADMIN SCRIPTS ─── -->
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/crm.js"></script>
<script src="js/projects.js"></script>
<script src="js/bartenders.js"></script>
<script src="js/analytics.js"></script>
<script src="js/expenses.js"></script>
<script src="js/inventory.js"></script>
<script src="js/funnel.js"></script>

</body>
</html>
